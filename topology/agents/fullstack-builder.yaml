id: fullstack-builder
kind: cross-domain
domains:
  - frontend
  - backend
allowed_skills:
  - test-first
  - debug-discipline
  - engineering-discipline
  - worktree-isolation
  - designer
  - behaviour-analysis
  - shadcn-expert
  - security-review
allowed_bundles:
  - frontend.design
  - frontend.react
  - backend.http
  - backend.lang.go
  - backend.lang.rust
forbidden_bundles: []
handoff_in: task_handoff
handoff_out: build_result
completion_proof: strictest_touched_domain
